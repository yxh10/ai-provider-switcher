<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Provider Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#6366f1"/>
            <path d="M15.5 7L9 15.5h4.5L12 21l7-9h-4.5L15.5 7z" fill="#fff"/>
          </svg>
        </div>
        <div>
          <h1>Codex Provider Manager</h1>
          <p class="config-path" id="configPath">~/.codex/config.toml</p>
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Add Provider
      </button>
    </header>

    <div class="active-banner" id="activeBanner"></div>

    <main class="main" id="mainContent">
      <div class="section-header">
        <h2>Providers</h2>
        <span class="provider-count" id="providerCount"></span>
      </div>
      <div class="provider-list" id="providerList"></div>
    </main>

    <footer class="footer">
      <button class="btn btn-ghost" id="envBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M5 8a3 3 0 016 0v3a1 1 0 001 1H4a1 1 0 001-1V8z" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Env Status
      </button>
      <button class="btn btn-ghost" id="backupBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 5a1 1 0 011-1h10a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1V5z" stroke="currentColor" stroke-width="1.5"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/></svg>
        Backup
      </button>
      <button class="btn btn-ghost" id="restoreBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 019-3M3 8l2-2M3 8l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5"/></svg>
        Restore
      </button>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="provider-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
