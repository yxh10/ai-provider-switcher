<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Codex Provider Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-brand">
        <div class="logo">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect width="28" height="28" rx="8" fill="#6366f1"/>
            <rect x="8" y="14" width="14" height="4" rx="2" fill="#fff" fill-opacity="0.25"/>
            <rect x="7" y="12" width="14" height="4" rx="2" fill="#fff" fill-opacity="0.5"/>
            <rect x="6" y="10" width="14" height="4" rx="2" fill="#fff"/>
          </svg>
        </div>
        <div>
          <h1 id="appTitle">Codex Providers</h1>
          <p class="config-path" id="configPath">~/.codex/config.toml</p>
        </div>
      </div>
      <button class="btn btn-primary" id="addBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M8 3v10M3 8h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Add Provider
      </button>
    </header>

    <div class="target-bar">
      <div class="target-switch" id="targetSwitch">
        <button class="target-seg" data-target="codex" type="button">
          <span class="target-seg-icon"><svg width="15" height="15" viewBox="0 0 256 260" fill="none"><path d="M239.184 106.203a64.72 64.72 0 0 0-5.576-53.103C219.452 28.459 191 15.784 163.213 21.74A65.586 65.586 0 0 0 52.096 45.22a64.72 64.72 0 0 0-43.23 31.36c-14.31 24.602-11.061 55.634 8.033 76.74a64.67 64.67 0 0 0 5.525 53.102c14.174 24.65 42.644 37.324 70.446 31.36a64.72 64.72 0 0 0 48.754 21.744c28.481.025 53.714-18.361 62.414-45.481a64.77 64.77 0 0 0 43.229-31.36c14.137-24.558 10.875-55.423-8.083-76.483m-97.56 136.338a48.4 48.4 0 0 1-31.105-11.255l1.535-.87 51.67-29.825a8.6 8.6 0 0 0 4.247-7.367v-72.85l21.845 12.636c.218.111.37.32.409.563v60.367c-.056 26.818-21.783 48.545-48.601 48.601M37.158 197.93a48.35 48.35 0 0 1-5.781-32.589l1.534.921 51.722 29.826a8.34 8.34 0 0 0 8.441 0l63.181-36.425v25.221a.87.87 0 0 1-.358.665l-52.335 30.184c-23.257 13.398-52.97 5.431-66.404-17.803M23.549 85.38a48.5 48.5 0 0 1 25.58-21.333v61.39a8.29 8.29 0 0 0 4.195 7.316l62.874 36.272-21.845 12.636a.82.82 0 0 1-.767 0L41.353 151.53c-23.211-13.454-31.171-43.144-17.804-66.405zm179.466 41.695-63.08-36.63L161.73 77.86a.82.82 0 0 1 .768 0l52.233 30.184a48.6 48.6 0 0 1-7.316 87.635v-61.391a8.54 8.54 0 0 0-4.4-7.213m21.742-32.69-1.535-.922-51.619-30.081a8.39 8.39 0 0 0-8.492 0L99.98 99.808V74.587a.72.72 0 0 1 .307-.665l52.233-30.133a48.652 48.652 0 0 1 72.236 50.391zM88.061 139.097l-21.845-12.585a.87.87 0 0 1-.41-.614V65.685a48.652 48.652 0 0 1 79.757-37.346l-1.535.87-51.67 29.825a8.6 8.6 0 0 0-4.246 7.367zm11.868-25.58L128.067 97.3l28.188 16.218v32.434l-28.086 16.218-28.188-16.218z" fill="currentColor"/></svg></span>
          <span class="target-seg-label">Codex</span>
        </button>
        <button class="target-seg" data-target="claude" type="button">
          <span class="target-seg-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M17.3041 3.541h-3.6718l6.696 16.918H24L17.3041 3.541ZM6.696 3.541 0 20.459h3.7442l1.3693-3.5527h7.0052l1.3693 3.5528h3.7442L10.5363 3.5409Zm-.3712 10.2232 2.2914-5.9456 2.2914 5.9456H6.3248Z" fill="currentColor"/></svg></span>
          <span class="target-seg-label">Claude Code</span>
        </button>
      </div>
    </div>

    <div class="active-banner" id="activeBanner"></div>

    <main class="main" id="mainContent">
      <div class="section-header">
        <h2>Providers</h2>
        <span class="provider-count" id="providerCount"></span>
      </div>
      <div class="provider-list" id="providerList"></div>
    </main>

    <footer class="footer">
      <button class="btn btn-ghost" id="envBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M5 8a3 3 0 016 0v3a1 1 0 001 1H4a1 1 0 001-1V8z" stroke="currentColor" stroke-width="1.5"/><path d="M6.5 13h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Env Status
      </button>
      <button class="btn btn-ghost" id="backupBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M2 5a1 1 0 011-1h10a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1V5z" stroke="currentColor" stroke-width="1.5"/><path d="M5 4V3a1 1 0 011-1h4a1 1 0 011 1v1" stroke="currentColor" stroke-width="1.5"/></svg>
        Backup
      </button>
      <button class="btn btn-ghost" id="restoreBtn">
        <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M3 8a5 5 0 019-3M3 8l2-2M3 8l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M3 11v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.5"/></svg>
        Restore
      </button>
    </footer>
  </div>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="provider-icons.js"></script>
  <script src="main.js"></script>
</body>
</html>
